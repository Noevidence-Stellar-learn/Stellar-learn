name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  typecheck-and-lint:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck-and-lint]
    env:
      # Stub env vars so Next.js build doesn't fail in CI
      DATABASE_URL: "postgresql://user:pass@localhost:5432/stub"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_stub"
      CLERK_SECRET_KEY: "sk_test_stub"
      NEXT_PUBLIC_STELLAR_NETWORK: "testnet"
      NEXT_PUBLIC_STELLAR_HORIZON_URL: "https://horizon-testnet.stellar.org"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      UPSTASH_REDIS_REST_URL: "https://stub.upstash.io"
      UPSTASH_REDIS_REST_TOKEN: "stub"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Build
        run: npm run build
